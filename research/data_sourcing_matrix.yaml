# DATA-SOURCE-01 — machine-checkable data-sourcing capability matrix
#
# Fixed schema (every capability_rows entry carries ALL 7 keys):
#   source, capability, value, threshold, pass, source_url, utc_fetch_ts
#
# Companion prose memo: research/DATA_SOURCING.md (narrates this matrix; carries
# the cost-of-ownership table, the SC#7(iv) coherence reconciliation, sign-off).
# All capability facts are live-probed in
# .planning/phases/01-…/01-RESEARCH.md §Data-Sourcing Capability Matrix
# (UTC fetches 2026-05-29T20:06Z–20:12Z unless marked vendor-doc / derived / scout).
#
# Provenance discipline (KPD-16): every row stamps source_url + utc_fetch_ts.

schema_version: v1

fixed_row_schema: [source, capability, value, threshold, pass, source_url, utc_fetch_ts]

# --------------------------------------------------------------------------- #
# capability_rows — one mapping per mandatory probe/fact row.                  #
# For non-numeric probes: threshold = "n/a", pass ∈ {true, false, provisional}.#
# --------------------------------------------------------------------------- #
capability_rows:

