    value: "0x13a7 = 5031"
    threshold: "5031"
    pass: true
    source_url: https://api.infra.mainnet.somnia.network/
    utc_fetch_ts: 2026-05-29T20:06Z

  - source: public-rpc
    capability: eth_getLogs cap
    value: 1000 blocks
    threshold: ">= 1 block/window (cap accepted; backfill windowed)"
    pass: true
    source_url: https://api.infra.mainnet.somnia.network/
    utc_fetch_ts: 2026-05-29T20:08Z

  - source: public-rpc
    capability: eth_getBlockReceipts
    value: AVAILABLE
    threshold: "method present (Phase-3 SC#2 per-block-receipt parity scan)"
    pass: true
    source_url: https://api.infra.mainnet.somnia.network/
    utc_fetch_ts: 2026-05-29T20:07Z

  - source: public-rpc
    capability: archive depth (deep-history)
    value: FULL ARCHIVE — correct at deploy block 283417317
    threshold: "serves eth_getLogs + eth_getStorageAt at startBlock"
    pass: true
    source_url: https://api.infra.mainnet.somnia.network/
    utc_fetch_ts: 2026-05-29T20:09Z

  - source: public-rpc
    capability: median block cadence
