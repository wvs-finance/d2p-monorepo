        - heading "Estimación / Estimation" [level=2] [ref=e42]
        - paragraph [ref=e43]: (es-CO) Se estima una regresión OLS estructural por mínimos cuadrados ordinarios con los tres rezagos (6, 9, 12 meses) como regresores simultáneos, más constante. El error estándar robusto de Newey-West (HAC) con ancho de banda 4 corrige la heterocedasticidad y la autocorrelación serial propias de la serie logit-transformada. El coeficiente compuesto β_composite = β₆ + β₉ + β₁₂ = +0.10889931 + 0.01164843 + 0.01616210 = +0.13670984; todos los coeficientes individuales son positivos (+/+/+). El error estándar HAC del compuesto es 0.02465 (calculado a partir de la suma de la matriz de covarianza HAC, incluyendo las entradas fuera de la diagonal, que son negativas por la alta colinealidad entre los rezagos). El estadístico t compuesto es +5.5456. El R² de la regresión es 0.168 (R² ajustado 0.149); la F conjunta de los tres rezagos tiene p = 3.05×10⁻⁶, confirmando que los rezagos añaden poder explicativo colectivo más allá de la constante.
        - paragraph [ref=e44]: (en) Structural OLS is estimated with the three lags (6, 9, 12 months) as simultaneous regressors plus a constant. Newey-West HAC SE (bandwidth 4) corrects for heteroskedasticity and serial autocorrelation inherent in the logit-transformed series. The composite coefficient β_composite = β₆ + β₉ + β₁₂ = +0.10889931 + 0.01164843 + 0.01616210 = +0.13670984; all individual lag coefficients are positive (+/+/+). The composite HAC SE is 0.02465 (derived from the full HAC covariance matrix sum including off-diagonal entries, which are negative due to high collinearity among the lag regressors). The composite t-statistic is +5.5456. Regression R² = 0.168 (adjusted 0.149); the joint F-test for the three lags yields p = 3.05×10⁻⁶, confirming that lags contribute collective explanatory power beyond the intercept.
        - heading "Pruebas / Tests" [level=2] [ref=e45]
        - paragraph [ref=e46]: "(es-CO) El árbol de decisión pre-registrado en spec §3.1 evalúa dos condiciones: (a) β_composite > 0 y (b) p_one_sided ≤ 0.05. Ambas se cumplen: β = +0.137 > 0 y p_one = 1.4648×10⁻⁸ ≪ 0.05. El IC 95% unilateral inferior es +0.0962, excluye el cero por ≈ 4 errores estándar. La consistencia de robustez R1–R4 (spec §7.1) produce 0 de 4 cambios de signo — veredicto AGREE. Las cláusulas de escalado Clause A (§3.3, p ∈ (0.05, 0.20]) y Clause B (§3.4, primary FAIL) no se activan. El trigger SUBSTRATE_TOO_NOISY (§3.5, ≥ 3 cambios de signo en R1–R4) tampoco se activa. El patrón de rezagos β₆/β₉/β₁₂ = +/+/+ confirma la dominancia del rezago 6 (β₆ ≈ 0.109 representa el 80% del compuesto), consistente con el horizonte BPO de 6–12 meses y con la dominancia predecida por spec §5.3. RC FLAG #3 (lag-6 dominance) queda documentado como hallazgo esperado, no como anomalía."
        - paragraph [ref=e47]: "(en) The pre-registered decision tree in spec §3.1 evaluates two conditions: (a) β_composite > 0 and (b) p_one_sided ≤ 0.05. Both are satisfied: β = +0.137 > 0 and p_one = 1.4648×10⁻⁸ ≪ 0.05. The one-sided 95% CI lower bound is +0.0962, excluding zero by approximately 4 standard errors. Robustness checks R1–R4 (spec §7.1) produce 0 of 4 sign flips — verdict AGREE. Escalation clauses Clause A (§3.3, p ∈ (0.05, 0.20]) and Clause B (§3.4, primary FAIL) do not fire. The SUBSTRATE_TOO_NOISY trigger (§3.5, ≥ 3 sign flips in R1–R4) does not fire either. The lag pattern β₆/β₉/β₁₂ = +/+/+ confirms lag-6 dominance (β₆ ≈ 0.109 represents 80% of the composite), consistent with the 6–12-month BPO contracting horizon and with the directional content predicted by spec §5.3. RC FLAG #3 (lag-6 dominance) is recorded as an expected finding, not an anomaly."
        - heading "Disposición / Disposition" [level=2] [ref=e48]
        - paragraph [ref=e49]: "(es-CO) PASS — Stage-2 M-sketch desbloqueado. La validación empírica cierra con veredicto PASS bajo la regla conjunta de spec §8.1 paso 4(a): Primary PASS + R-consistency AGREE, sin activación de los caminos de escalado §3.3 / §3.4. El estimado β_composite = +0.13670985, con SE HAC 0.02465, t = +5.5456, p_one = 1.46×10⁻⁸, e IC 95% bilateral = [0.0884, 0.1850]. El tamaño muestral es N = 134 observaciones mensuales (enero 2015 – febrero 2026). La afirmación empírica que se transfiere al M-sketch: una devaluación del 1% del peso hoy se asocia con un aumento mensurable en la participación de los servicios jóvenes concentrado en el horizonte de 6 meses, dentro de (pero no uniformemente a través de) la ventana de contratación BPO de 6–12 meses. La correlación está identificada; el canal causal BPO no lo está (RC FLAG #1: la cobertura de la correlación, no del mecanismo). La calibración del M-sketch hereda el mix de regímenes 2015–2026 (post-2014 oil shock, COVID-19, apretamiento Fed), que sobre-representa regímenes de alta volatilidad; esto es marcado como sensibilidad para la recalibración en Stage-3 (RC FLAG #6)."
        - paragraph [ref=e50]: "(en) PASS — Stage-2 M-sketch unblocked. Empirical validation closes with verdict PASS under the joint rule of spec §8.1 step 4(a): Primary PASS + R-consistency AGREE, with no activation of escalation paths §3.3 / §3.4. Estimate: β_composite = +0.13670985, HAC SE 0.02465, t = +5.5456, p_one = 1.46×10⁻⁸, two-sided 95% CI = [0.0884, 0.1850]. Sample size N = 134 monthly observations (January 2015 – February 2026). The empirical claim that travels into the M-sketch: a 1% peso devaluation today is associated with a measurable rise in the young-worker services share concentrated at the 6-month horizon, within (but not uniformly across) the 6–12-month BPO contracting window. The correlation is identified; the BPO causal channel is not (RC FLAG #1: hedge the correlation, not the mechanism). The M-sketch calibration inherits the 2015–2026 regime mix (post-2014 oil shock, COVID-19, Fed tightening), which over-represents high-volatility regimes; this is flagged as a recalibration sensitivity for Stage-3 (RC FLAG #6)."
