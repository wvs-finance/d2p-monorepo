    - generic [ref=e30]:
      - article [ref=e31]:
        - heading "Especificación / Spec" [level=2] [ref=e32]
        - paragraph [ref=e33]: "(es-CO) Pre-comprometemos que la elasticidad de la participación de los servicios de trabajadores jóvenes (14–28 años) en Colombia respecto al tipo de cambio COP/USD rezagado entre 6 y 12 meses tiene signo positivo y magnitud detectable a frecuencia mensual. La hipótesis nula H₀: β_composite ≤ 0; la alterna H₁: β_composite > 0. El umbral de aprobación es t > 2 con error estándar robusto HAC (Newey-West, ancho de banda 4). Horizonte de estimación: 2015-01-31 a 2026-02-28. Variable dependiente: participación logit-transformada del sector de servicios (CIIU Rev.4 G–T) en el empleo joven, fuente DANE GEIH. Variable independiente: log(COP/USD) rezagado 6, 9 y 12 meses simultáneamente; β_composite = β₆ + β₉ + β₁₂. Especificación sin dummy de ruptura estructural (el dummy marco2018 es exclusivo del escenario de robustez R1 per spec §6; la primary OLS sigue §5.3 verbatim)."
        - paragraph [ref=e34]: "(en) We pre-commit that the elasticity of Colombian young-worker services-sector employment share (ages 14–28) to COP/USD lagged 6 to 12 months has positive sign and detectable magnitude at monthly frequency. H₀: β_composite ≤ 0; H₁: β_composite > 0. Approval threshold: t > 2 with HAC robust SE (Newey-West, bandwidth 4). Estimation window: 2015-01-31 to 2026-02-28. Dependent variable: logit-transformed services-sector share (ISIC Rev.4 G–T) in young-worker employment, sourced from DANE GEIH. Independent variable: log(COP/USD) lagged 6, 9, and 12 months simultaneously; β_composite = β₆ + β₉ + β₁₂. Specification excludes structural-break dummy (the marco2018 dummy is restricted to robustness check R1 per spec §6; primary OLS follows §5.3 verbatim)."
        - heading "Datos / Data" [level=2] [ref=e35]
        - paragraph [ref=e36]:
          - text: (es-CO) El panel conjunto se construye fusionando dos series de frecuencia mensual sobre el período 2015-01-31 a 2026-02-28 (N = 134 observaciones de fin de mes). La serie Y proviene del módulo de empleo de la DANE GEIH (Gran Encuesta Integrada de Hogares), desagregada por grupo de edad (14–28) y rama de actividad CIIU Rev.4, secciones G a T. La transformación logit estabiliza la varianza de la proporción y garantiza que la escala del regresor sea comparable. La serie X es el tipo de cambio nominal COP/USD de fin de mes reportado por el Banco de la República (TRM), transformado en logaritmo natural. Los rezagos 6, 9 y 12 se construyen dentro del panel; las observaciones iniciales perdidas por el rezago máximo de 12 meses son excluidas, lo que impone el inicio de ventana efectiva en enero de 2015. El panel combinado tiene hash SHA-256
          - code [ref=e37]: 6d7d9e60dad1715ce86e8adb7b3d44ba236d0b063796293b40575994a9363edf
          - text: (artefacto en
          - code [ref=e38]: contracts/.scratch/simple-beta-pair-d/data/panel_combined.parquet
          - text: ).
        - paragraph [ref=e39]:
          - text: (en) The joint panel merges two monthly-frequency series over 2015-01-31 to 2026-02-28 (N = 134 month-end observations). The Y series is derived from the DANE GEIH (Gran Encuesta Integrada de Hogares) employment module, disaggregated by age group (14–28) and ISIC Rev.4 activity branch, sections G through T. The logit transformation stabilizes proportion variance and ensures regressor-scale comparability. The X series is the month-end nominal COP/USD exchange rate reported by Banco de la República (TRM), log-transformed. Lags 6, 9, and 12 are constructed within the panel; initial observations lost to the maximum 12-month lag are excluded, imposing an effective window start of January 2015. The combined panel carries SHA-256 fingerprint
