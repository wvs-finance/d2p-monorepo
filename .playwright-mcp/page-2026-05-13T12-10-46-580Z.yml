          - paragraph [ref=e61]: "(es-CO) Esta iteración fue rechazada. El estimado β̂_CPI = -0.000685 con IC 90% = [-0.003635, 0.002265] sobre n = 947 observaciones contiene el cero. El efecto de la sorpresa CPI sobre la volatilidad FX en Colombia es estadísticamente indistinguible de cero al 90% de confianza. Se conserva como ejemplo de fracaso disciplinado: la hipótesis fue pre-comprometida, los datos fueron extraídos antes de ver resultados, y el rechazo se documenta con el mismo peso narrativo que las aprobaciones del laboratorio. (en) This iteration was rejected. The estimate β̂_CPI = -0.000685 with 90% CI = [-0.003635, 0.002265] over n = 947 observations contains zero. The effect of CPI surprise on FX volatility in Colombia is statistically indistinguishable from zero at 90% confidence. Retained as a worked example of disciplined failure: the hypothesis was pre-committed, data was pulled before results were inspected, and the rejection is documented with the same narrative weight as the lab's passes."
