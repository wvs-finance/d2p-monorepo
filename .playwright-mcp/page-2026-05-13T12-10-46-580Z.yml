      - heading "Volatilidad FX ante sorpresa CPI — Colombia" [level=1] [ref=e29]
      - time [ref=e30]: 23 de febrero de 2026
    - generic [ref=e31]:
      - article [ref=e32]:
        - heading "Especificación / Spec" [level=2] [ref=e33]
        - paragraph [ref=e34]: "(es-CO) Pre-comprometemos que la sorpresa en el índice de precios al consumidor (CPI) de Colombia tiene un efecto positivo y detectable sobre la volatilidad realizada del tipo de cambio COP/USD a frecuencia semanal. La hipótesis nula H₀: β_CPI ≤ 0; la alterna H₁: β_CPI > 0. La regla de decisión primaria (T3b) es β̂_CPI − 1.28·SE > 0, equivalente a una prueba unilateral al 90% de confianza con error estándar HAC(4) de Newey-West. La variable dependiente es la varianza realizada elevada a la potencia 1/3 (RV^(1/3)) a frecuencia semanal, transformación que estabiliza la varianza de la distribución asimétrica de la volatilidad. La variable de tratamiento es la sorpresa CPI AR(1)-filtrada, definida como la diferencia entre el dato CPI publicado y el pronóstico derivado de un AR(1) ajustado fuera de muestra. El panel cubre Colombia, 2008-01-07 a 2026-02-23."
        - paragraph [ref=e35]: "(en) We pre-commit that the CPI surprise for Colombia has a positive and detectable effect on realized COP/USD exchange-rate volatility at weekly frequency. H₀: β_CPI ≤ 0; H₁: β_CPI > 0. Primary decision rule (T3b): β̂_CPI − 1.28·SE > 0, equivalent to a one-sided test at 90% confidence with HAC(4) Newey-West SE. Dependent variable: realized variance raised to the power 1/3 (RV^(1/3)) at weekly frequency, a transformation that stabilizes the variance of the skewed volatility distribution. Treatment variable: AR(1)-filtered CPI surprise, defined as the difference between the published CPI release and a pre-sample AR(1) forecast. Panel: Colombia, 2008-01-07 to 2026-02-23."
        - heading "Datos / Data" [level=2] [ref=e36]
        - paragraph [ref=e37]:
          - text: "(es-CO) El panel semanal colombiano se construye a partir de tres fuentes primarias. La volatilidad realizada COP/USD se calcula como la suma de cuadrados de los retornos diarios log dentro de cada semana, transformada en RV^(1/3) para garantizar quasi-normalidad. El tipo de cambio diario TRM (tasa representativa del mercado) proviene del Banco de la República. Las fechas de publicación CPI y los valores nominales del índice provienen del DANE. Las variables de control incluyen: dummy de intervención cambiaria, dummy de día de publicación del PPI, retornos del petróleo (log-diferencia), nivel de petróleo en log, y el VIX de cierre diario como proxy de volatilidad global. El panel tiene n = 947 semanas (observaciones de inicio de semana, lunes). La especificación primaria es la Columna 6 del OLS, que incluye los seis controles más la constante. El panel fingerprint está documentado en"
          - code [ref=e38]: estimates/nb1_panel_fingerprint.json
          - text: (fingerprint sha-256 en el README de la colección de notebooks).
        - paragraph [ref=e39]:
          - text: "(en) The Colombian weekly panel is built from three primary sources. Realized COP/USD volatility is computed as the sum of squared log daily returns within each week, transformed as RV^(1/3) to achieve quasi-normality. Daily TRM (tasa representativa del mercado) exchange rates come from Banco de la República. CPI release dates and nominal index values come from DANE. Control variables include: FX intervention dummy, PPI release-day dummy, oil log-return, oil log-level, and daily VIX close as a global volatility proxy. The panel contains n = 947 weeks (week-start observations, Mondays). The primary specification is Column 6 OLS, which includes all six controls plus a constant. Panel fingerprint is documented in"
          - code [ref=e40]: estimates/nb1_panel_fingerprint.json
          - text: (SHA-256 fingerprint in the notebook collection README).
        - heading "Estimación / Estimation" [level=2] [ref=e41]
        - paragraph [ref=e42]: "(es-CO) La especificación primaria es OLS de la Columna 6 sobre 947 observaciones semanales: RV^(1/3)_t = α + β_CPI·surprise_CPI_t + β_controls·X_t + ε_t, con error estándar HAC(4) de Newey-West. El estimado puntual es β̂_CPI = -0.000685, SE = 0.001794. El IC 90% bilateral por aproximación normal (±1.645·SE) es [-0.003635, 0.002265]. Se estimaron adicionalmente dos especificaciones de robustez: (a) GARCH-X, con coeficiente δ̂_CPI = 0.000000 (SE = 0.000000) — convergencia numérica al cero, compatible con la OLS primaria; (b) descomposición OLS con CPI y PPI separados: β̂_CPI = -0.000605 (SE 0.001838, IC 90% [-0.003628, 0.002417]), β̂_PPI = +0.000245 (SE 0.000682, IC 90% [-0.000877, 0.001367]) — ambos CI contienen cero. Las tres especificaciones son mutuamente coherentes en signo y orden de magnitud para el coeficiente CPI: reconciliación = AGREE."
        - paragraph [ref=e43]: "(en) The primary specification is Column 6 OLS on 947 weekly observations: RV^(1/3)_t = α + β_CPI·surprise_CPI_t + β_controls·X_t + ε_t, with HAC(4) Newey-West SE. Point estimate: β̂_CPI = -0.000685, SE = 0.001794. Two-sided 90% CI by normal approximation (±1.645·SE): [-0.003635, 0.002265]. Two robustness specifications were also estimated: (a) GARCH-X, with δ̂_CPI = 0.000000 (SE = 0.000000) — numerical convergence to zero, consistent with primary OLS; (b) OLS decomposition separating CPI and PPI: β̂_CPI = -0.000605 (SE 0.001838, 90% CI [-0.003628, 0.002417]), β̂_PPI = +0.000245 (SE 0.000682, 90% CI [-0.000877, 0.001367]) — both CIs contain zero. All three specifications are mutually coherent in sign and order of magnitude for the CPI coefficient: reconciliation = AGREE."
        - heading "Pruebas / Tests" [level=2] [ref=e44]
        - paragraph [ref=e45]: "(es-CO) La prueba primaria T3b (gate primario) evalúa β̂_CPI − 1.28·SE > 0: observado -0.000685 − 1.28·0.001794 = -0.000685 − 0.002296 = -0.002981 < 0 — FAIL. El veredicto final es FAIL independientemente de las pruebas auxiliares, per la regla de agregación (Rev 4 spec): T3b FAIL implica FAIL final. Las pruebas auxiliares y de diagnóstico documentadas son: T1 (Mincer-Zarnowitz F, racionalidad del consenso): FAIL; T2 (Levene canal de anuncio): FAIL; T3a (bilateral β ≠ 0): FAIL TO REJECT (no se rechaza el nulo bidireccional); T4 (Ljung-Box Q, 1–8): FAIL; T5 (Jarque-Bera): FAIL; T6 (Bai-Perron alineación): FAIL; T7 (adecuación del dummy de intervención): PASS. Las filas A1 (cadencia mensual) y A4 (excluyendo días de publicación) muestran IC 90% que excluyen el cero en dirección positiva — bajo protocolo anti-fishing pre-comprometido (Simonsohn, Simmons & Nelson 2020; Ankel-Peters, Brodeur & Connolly 2024), estas filas se preservan para transparencia pero NO se usan para revisar el gate. El sesgo de selección de especificaciones prohibe promover las filas de rechazo-pero-no-rescate a estado de material-mover. El conteo de material-movers = 0."
        - paragraph [ref=e46]: "(en) The primary gate T3b evaluates β̂_CPI − 1.28·SE > 0: observed -0.000685 − 1.28·0.001794 = -0.000685 − 0.002296 = -0.002981 < 0 — FAIL. The final verdict is FAIL regardless of auxiliary tests, per the aggregation rule (Rev 4 spec): T3b FAIL implies final FAIL. Auxiliary and diagnostic test results: T1 (Mincer-Zarnowitz F, consensus rationality): FAIL; T2 (Levene announcement channel): FAIL; T3a (two-sided β ≠ 0): FAIL TO REJECT (null not rejected bidirectionally); T4 (Ljung-Box Q, 1–8): FAIL; T5 (Jarque-Bera): FAIL; T6 (Bai-Perron alignment): FAIL; T7 (intervention dummy adequacy): PASS. Sensitivity rows A1 (monthly cadence) and A4 (release-day excluded) show 90% CIs excluding zero in the positive direction — under the pre-committed anti-fishing protocol (Simonsohn, Simmons & Nelson 2020; Ankel-Peters, Brodeur & Connolly 2024), these rows are preserved for transparency but NOT used to revise the gate. Specification-search bias prohibits promoting rejecting-but-not-rescue rows to material-mover status. Material-movers count = 0."
        - heading "Disposición / Disposition" [level=2] [ref=e47]
        - paragraph [ref=e48]: "(es-CO) FAIL — Iteración rechazada. El efecto de la sorpresa CPI sobre la volatilidad FX en Colombia es estadísticamente indistinguible de cero al 90% de confianza (β̂_CPI = -0.000685, IC 90% = [-0.003635, 0.002265], n = 947). La hipótesis fue pre-comprometida antes de ver los datos; el protocolo anti-fishing se ejecutó correctamente; el rechazo es conclusivo y disciplinado. La interpretación económica del resultado negativo es la siguiente: la señal de sorpresa CPI en Colombia tiene una relación señal-ruido insuficiente para predecir la volatilidad FX semanal durante el período 2008–2026. Los posibles factores contribuyentes incluyen: (a) la incertidumbre en el timing de la publicación DANE puede dispersar el efecto de anuncio en días adjacentes, reduciendo la señal en la semana de publicación; (b) el canal de transmisión de la política monetaria del Banco de la República puede dominar la respuesta FX, con el sorpresa CPI como señal derivada más que directa; (c) el período muestral 2008–2026 sobre-representa regímenes post-2014 (caída del petróleo, COVID, apretamiento Fed) donde la dinámica FX colombiana puede responder más a factores externos que a las señales inflacionarias internas. Esta iteración se retiene como ejemplo trabajado de fracaso pre-comprometido: el rigor metodológico tiene el mismo valor epistémico tanto en el rechazo como en la aprobación."
        - paragraph [ref=e49]: "(en) FAIL — Iteration rejected. The effect of CPI surprise on FX volatility in Colombia is statistically indistinguishable from zero at 90% confidence (β̂_CPI = -0.000685, 90% CI = [-0.003635, 0.002265], n = 947). The hypothesis was pre-committed before inspecting the data; the anti-fishing protocol was executed correctly; the rejection is conclusive and disciplined. The economic interpretation of the negative result is as follows: the CPI surprise signal in Colombia has insufficient signal-to-noise to predict weekly FX volatility over the 2008–2026 period. Contributing factors likely include: (a) uncertainty in DANE publication timing may disperse the announcement effect across adjacent days, attenuating the signal in the publication week; (b) Banco de la República monetary policy transmission may dominate the FX response, with CPI surprise acting as a derived rather than direct signal; (c) the sample period 2008–2026 over-represents post-2014 regimes (oil collapse, COVID-19, Fed tightening) where Colombian FX dynamics may respond more to external factors than to domestic inflation signals. This iteration is retained as a worked example of disciplined pre-committed failure: methodological rigor carries equal epistemic value in rejection and approval alike."
