[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
viaIR = false

[profile.ci]
fuzz = { runs = 256 }

[rpc_endpoints]
base = "${BASE_RPC_URL}"

[fuzz]
runs = 256

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
