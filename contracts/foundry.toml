[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# v4-hooks-public pulls in deep transitive deps (protocol-fees, optimism, pancake, etc.) that
# have missing/incompatible sources and would break a full `forge build`. Nothing in src/ or
# test/ imports it, so skip the whole tree at compile time. (`skip` is the foundry compiler
# filter; the deprecated `exclude` key is silently ignored on forge 1.5.x.)
skip = ["lib/v4-hooks-public/**"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
viaIR = false
rpc_storage_caching = { chains = [8453, 137], endpoints = "all" }
fs_permissions = [
  { access = "read",       path = "./metadata/" },
  { access = "read-write", path = "./fork-state/" },
]

[profile.ci]
fuzz = { runs = 256 }

[rpc_endpoints]
base = "${BASE_RPC_URL}"
polygon = "https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[fuzz]
runs = 256

# Phase-8 invariant fuzz floor (08-07): a DELIBERATELY LOW floor because each handler action does real
# dispatch+swap against a Base FORK (slow + RPC-bound). Without this section Foundry silently applies its
# 256x500 defaults, which on a fork blows far past the VALIDATION feedback target. Additive — does NOT
# clobber [fuzz] runs=256 or the Phase-7/11 profiles.
[invariant]
runs = 16
depth = 16
fail_on_revert = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
